<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; background: #231F20; }
        #unity-container { width: 100%; height: 100%; position: relative; }
        #unity-canvas { width: 100%; height: 100%; background: #231F20; }
        #loading-cover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #231F20; }
        #unity-progress-bar-empty { width: 40%; height: 24px; border: 1px solid white; padding: 2px; }
        #unity-progress-bar-full { width: 0%; height: 100%; background: white; }
        
        /* HIDDEN ELEMENTS: This stops the ads from physically showing up */
        #sdk__advertisement, #gmLoadingText, .imgb, #imaContainer, #imaContainer_new { 
            display: none !important; 
            visibility: hidden !important; 
            pointer-events: none !important; 
        }
    </style>
</head>
<body class="dark">
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>
    <div id="loading-cover">
        <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/new-ast/baseline@6ee848357def2ddafd4842db987a6510fb8c3887/lib/min.js"></script>
    
    <script>
        const buildUrl = "https://cdn.jsdelivr.net/gh/new-ast/baseline@6ee848357def2ddafd4842db987a6510fb8c3887/lib";
        const config = {
            dataUrl: buildUrl + "/cas-gm.data.br",
            frameworkUrl: buildUrl + "/cas-gm.framework.js",
            codeUrl: buildUrl + "/cas-gm.wasm.br",
            innerLoaderUrl: buildUrl + "/loader.js",
            streamingAssetsUrl: "StreamingAssets",
        };

        const canvas = document.querySelector("#unity-canvas");
        const loadingCover = document.querySelector("#loading-cover");
        const progressBarFull = document.querySelector("#unity-progress-bar-full");

        let ygGameInstance = null;

        // Force Start Loop
        function forceGameActive() {
            if (ygGameInstance) {
                ygGameInstance.SendMessage('YG2Instance', 'SetFocusWindowGame', 'true');
                ygGameInstance.SendMessage('YG2Instance', 'OnCloseVast');
            }
        }

        startUnityBr(canvas, config, (progress) => {
            progressBarFull.style.width = (100 * progress) + "%";
        }).then((unityInstance) => {
            ygGameInstance = unityInstance;
            loadingCover.style.display = "none";
            
            // Run force-active every 2 seconds in case the game tries to auto-pause for an ad
            setInterval(forceGameActive, 2000);
        });

        // Mock SDK Object to satisfy the game's internal checks
        window.SDK_OPTIONS = { gameId: "bypass", onEvent: function(e) {} };
    </script>
    
    <script src="https://cdn.jsdelivr.net/gh/new-ast/baseline@6ee848357def2ddafd4842db987a6510fb8c3887/lib/loader.js" async></script>
</body>
</html>
